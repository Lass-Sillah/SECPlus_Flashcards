    /* ───────────── Card Data ───────────── */
    function generateCards() {
      return {
        "fundamentals": [
          {t:"CIA Triad",c:"Confidentiality: Sensitive info accessed only by authorized persons.\nIntegrity: Assuring accuracy and reliability of info/systems.\nAvailability: Data and resources available to authorized users when needed."},
          {t:"Confidentiality",c:"Measures to ensure sensitive info is not disclosed to unauthorized entities.\n• Access Controls (passwords, biometrics)\n• Encryption\n• Secure Communication (SSL/TLS)\n• Data Classification"},
          {t:"Integrity",c:"Protecting data from unauthorized changes to ensure reliability.\n• Checksums & Hash Functions\n• Digital Signatures\n• Access Controls\n• Version Control"},
          {t:"Availability",c:"Ensuring data/systems accessible when needed.\n• Redundancy\n• Fault Tolerance\n• Backup Systems\n• Disaster Recovery Plans\n• Prevents DDoS impact"},
          {t:"DAD Triad",c:"Opposite of CIA Triad:\n• Disclosure — breach of confidentiality\n• Alteration — loss of integrity\n• Destruction — attack on availability"},
          {t:"Non-repudiation",c:"Ensures a party cannot deny the authenticity of their signature or message.\nImplemented using digital signatures with cryptographic techniques."},
          {t:"AAA Framework",c:"Authentication: Verifying identity of user/device.\nAuthorization: Determining what user is permitted to do.\nAccounting (Auditing): Tracking user activities and resource usage."},

          {t:"MFA",c:"Multi-Factor Authentication requires 2+ independent credential categories.\nCombines: knowledge + possession + inherence.\nStronger than any single factor alone."},
          {t:"Authorization",c:"Determines what authenticated users can do.\n• Permissions & Privileges (read, write, execute)\n• Access Control Lists (ACLs)\n• Models: MAC, DAC, RBAC"},

          {t:"Gap Analysis",c:"Comparing current security posture with standards/requirements.\n1. Identify Current State\n2. Determine Target State\n3. Analyze the Gap\n4. Plan remediation"},
          {t:"Zero Trust",c:"Never automatically trust anything inside or outside perimeter.\n• Strict Identity Verification\n• Least Privilege Access\n• MFA everywhere\n• Monitor and Log All Traffic"},
          {t:"Zero Trust Architecture",c:"Data Plane: Policy Enforcement Point, Implicit Trust Zones\nControl Plane: Adaptive Identity, Policy-driven Access Control, Policy Engine, Policy Administrator\nThreat Scope Reduction"},

          {t:"Security Controls Types",c:"Preventive: stop incidents (IPS, firewalls)\nDetective: detect incidents (IDS, SIEM)\nCorrective: remediate (backups, IR)\nDeterrent: discourage (cameras, guards)\nDirective: policies, procedures\nCompensating: alternate controls"},
        ],
        "threats": [
          {t:"Threat Actors",c:"Nation-state: government-sponsored, APTs\nOrganized Crime: financial motivation\nHacktivists: political/social agenda\nInsider Threats: employees with access\nScript Kiddies: low skill, use existing tools"},
          {t:"Attack Vectors",c:"Methods attackers use to gain access:\n• Phishing/social engineering\n• Unpatched vulnerabilities\n• Misconfigured systems\n• Supply chain compromise\n• Removable media"},
          {t:"Indicators of Compromise (IoC)",c:"Evidence that a system has been breached:\n• Unusual outbound traffic\n• Anomalous privileged user activity\n• Geographic login irregularities\n• Unexpected software/processes\n• Log anomalies"},
          {t:"Malware Types",c:"Virus: self-replicating, attaches to files\nWorm: self-propagating across networks\nTrojan: disguised as legitimate software\nSpyware: monitors user activity\nAdware: displays unwanted ads\nRootkit: hides in OS kernel"},

        "vulnerabilities": [
          {t:"Vulnerability Types",c:"Software: coding flaws, buffer overflows\nConfiguration: default settings, open ports\nHardware: firmware flaws, physical access\nHuman: social engineering susceptibility\nZero-day: unknown to vendor"},

          {t:"Race Condition",c:"When system behavior depends on timing of uncontrolled events.\n• TOCTOU (Time of Check/Time of Use)\n• Can bypass security checks\nMitigate: locks, mutexes, proper synchronization"},

        "encryption": [

          {t:"AES",c:"Advanced Encryption Standard.\n• Symmetric block cipher\n• Key sizes: 128, 192, 256 bits\n• Block size: 128 bits\n• Current gold standard for encryption"},
          {t:"RSA",c:"Rivest-Shamir-Adleman asymmetric algorithm.\n• Based on factoring large primes\n• Used for encryption & digital signatures\n• Key sizes: 2048+ bits recommended\n• Slower than symmetric methods"},
          {t:"Hashing",c:"One-way function producing fixed-size output from any input.\n• Cannot be reversed\n• Used for integrity verification\n• MD5 (broken), SHA-1 (deprecated), SHA-256, SHA-3"},
          {t:"Digital Signatures",c:"Uses asymmetric crypto to verify authenticity & integrity.\n• Sign with private key\n• Verify with public key\n• Provides non-repudiation\n• Used in certificates, code signing"},
          {t:"PKI (Public Key Infrastructure)",c:"Framework for managing digital certificates and keys.\n• Certificate Authority (CA)\n• Registration Authority (RA)\n• Certificate Revocation List (CRL)\n• OCSP for real-time validation"},

          {t:"Tokenization",c:"Replacing sensitive data with non-sensitive placeholder tokens.\n• Original data stored securely in token vault\n• Used for credit card numbers, PII\n• Reduces scope of compliance (PCI DSS)"},
        ],
        "socialeng": [
          {t:"Social Engineering",c:"Manipulating people to divulge information or perform actions.\n• Exploits human psychology\n• Often first step in larger attacks\n• Most effective attack vector"},
          {t:"Phishing",c:"Fraudulent emails/messages to steal credentials or install malware.\n• Spear phishing: targeted individual\n• Whaling: targeting executives\n• Vishing: voice phishing\n• Smishing: SMS phishing"},
          {t:"Pretexting",c:"Creating fabricated scenario to engage victim.\n• Impersonating authority figure\n• Building trust over time\n• Often combined with other techniques"},

          {t:"Shoulder Surfing",c:"Observing someone's screen or keyboard to steal info.\n• Can be done in person or with cameras\nMitigate: privacy screens, awareness, positioning"},
          {t:"Dumpster Diving",c:"Searching through trash for sensitive information.\n• Discarded documents, drives, media\nMitigate: shredding, secure disposal, clean desk policy"},

        "architecture": [
          {t:"Cloud Service Models",c:"IaaS: Infrastructure (VMs, storage, networking)\nPaaS: Platform (development environment)\nSaaS: Software (applications)\nResponsibility varies by model — shared responsibility model"},

          {t:"IoT Security",c:"Internet of Things challenges:\n• Default credentials\n• Limited processing for security\n• Unpatched firmware\n• Large attack surface\nMitigate: network segmentation, firmware updates, strong auth"},

          {t:"Data Protection",c:"Data states:\n• At rest: encryption (AES, BitLocker)\n• In transit: TLS/SSL, VPN\n• In use: memory encryption\n• Data Loss Prevention (DLP) monitors all states"},

          {t:"Post-Incident Activities",c:"• Lessons learned meetings\n• Update IR plan\n• Improve detection rules\n• Root cause analysis\n• Documentation for legal/compliance\n• Metrics and KPIs"},
          {t:"CSIRT",c:"Computer Security Incident Response Team.\n• Coordinates incident response\n• Internal and/or external team\n• Defined roles and responsibilities\n• Regular training and exercises\n• Tabletop exercises"},
          {t:"Order of Volatility",c:"Collect evidence from most to least volatile:\n1. CPU registers/cache\n2. RAM\n3. Swap/temp files\n4. Hard drive\n5. Remote logs\n6. Physical configuration\n7. Archival media"},
        ],

          {t:"Security Frameworks",c:"NIST CSF: Identify, Protect, Detect, Respond, Recover\nISO 27001: ISMS standard\nCIS Controls: prioritized security actions\nCOBIT: IT governance framework\nMITRE ATT&CK: adversary tactics and techniques"},

          {t:"Business Impact Analysis",c:"Identifies critical business functions and impact of disruption.\n• RTO: Recovery Time Objective\n• RPO: Recovery Point Objective\n• MTTR: Mean Time to Repair\n• MTBF: Mean Time Between Failures"},
          {t:"Third-Party Risk",c:"Risks from vendors, suppliers, partners.\n• Vendor assessment questionnaires\n• SOC 2 reports\n• Right to audit clauses\n• Supply chain risk management\n• SLA requirements"},
          {t:"Governance Concepts",c:"• Policies: high-level intent\n• Standards: mandatory requirements\n• Guidelines: recommended practices\n• Procedures: step-by-step instructions\n• Baselines: minimum security levels"},
          {t:"Data Privacy",c:"• PII: Personally Identifiable Information\n• PHI: Protected Health Information\n• Data minimization\n• Purpose limitation\n• Right to be forgotten (GDPR)\n• Privacy impact assessments"},
          {t:"Audit Types",c:"Internal: conducted by organization\nExternal: conducted by third party\nRegulatory: required by law\n• Compliance audits\n• Operational audits\n• Financial audits"},
        ],
        "physical": [
          {t:"Physical Security Controls",c:"• Fences, gates, bollards\n• Security guards\n• CCTV cameras\n• Lighting\n• Mantraps/vestibules\n• Locks (biometric, cipher, electronic)"},
          {t:"Access Control Vestibule",c:"Also called mantrap. Small room with two doors.\n• Only one door opens at a time\n• Prevents tailgating\n• Can include authentication\n• Common in data centers"},

          {t:"Fire Suppression",c:"Wet pipe: water always in pipes (most common)\nDry pipe: water held back until activated\nPre-action: combination of dry + detection\nGas-based: FM-200, CO2 (for electronics)\nClass C fires for electrical equipment"},

          {t:"Secure Areas",c:"• Server rooms: restricted access\n• Data centers: multiple security layers\n• Faraday cages: block EM signals\n• SCIF: Sensitive Compartmented Info Facility\n• Air-gapped networks"},
        ],
        "resilience": [
          {t:"High Availability",c:"Systems designed to minimize downtime.\n• 99.999% uptime (five nines) = ~5 min/year\n• Redundant components\n• Load balancing\n• Failover clustering\n• Geographic redundancy"},
          {t:"Backup Types",c:"Full: complete copy of all data\nIncremental: only changes since last backup\nDifferential: changes since last full backup\nSnapshot: point-in-time copy\n3-2-1 Rule: 3 copies, 2 media types, 1 offsite"},
          {t:"Disaster Recovery",c:"Restoring IT operations after major disruption.\n• Hot site: fully operational duplicate\n• Warm site: partially equipped\n• Cold site: empty facility\n• Cloud-based DR\n• Regular DR testing"},
          {t:"Load Balancing",c:"Distributing traffic across multiple servers.\n• Round-robin\n• Least connections\n• Weighted distribution\n• Health checks\n• Increases availability and performance"},
          {t:"RAID",c:"Redundant Array of Independent Disks.\nRAID 0: striping (performance, no redundancy)\nRAID 1: mirroring (redundancy)\nRAID 5: striping with parity (min 3 disks)\nRAID 6: double parity\nRAID 10: mirror + stripe"},
          {t:"Recovery Metrics",c:"RTO: Recovery Time Objective — max acceptable downtime\nRPO: Recovery Point Objective — max data loss acceptable\nMTTR: Mean Time to Repair\nMTBF: Mean Time Between Failures"},
          {t:"Redundancy Types",c:"• Server redundancy: clustering\n• Network redundancy: multiple paths\n• Power redundancy: UPS, generators\n• Data redundancy: replication, RAID\n• Geographic redundancy: multiple sites\n• N+1, 2N configurations"},

    /* ═══════════════════════════════════════════ */
    /*                  MAIN APP                  */
    /* ═══════════════════════════════════════════ */
    function SecurityPlusApp() {
      const [view, setView] = useState("home"); // home | study | random
      const [selectedSection, setSelectedSection] = useState(null);
      const [cardData] = useState(() => generateCards());
      const [progress, setProgress] = useState({});
      const [currentCard, setCurrentCard] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [mastered, setMastered] = useState({});
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedDomain, setSelectedDomain] = useState(null);

      // Streak
      const [dailyStreak, setDailyStreak] = useState(0);
      const [lastStudyDate, setLastStudyDate] = useState(null);
      const [todayCompleted, setTodayCompleted] = useState(false);
      const [sectionsCompletedToday, setSectionsCompletedToday] = useState(new Set());
      const [showCelebration, setShowCelebration] = useState(false);
      const [showStreakPopup, setShowStreakPopup] = useState(false);

      // Study mode
      const [shuffled, setShuffled] = useState(false);
      const [unmasteredOnly, setUnmasteredOnly] = useState(false);
      const [cardOrder, setCardOrder] = useState([]);
      const studyStateRef = useRef({});

      // Random mode
      const [randomPool, setRandomPool] = useState([]);
      const [randomIndex, setRandomIndex] = useState(0);
      const [randomCardsStudied, setRandomCardsStudied] = useState(0);

      // Sound
      const [soundEnabled, setSoundEnabled] = useState(() => {
        try { return JSON.parse(localStorage.getItem("secplus_soundEnabled") ?? "true"); } catch { return true; }
      });
      useEffect(() => { try { localStorage.setItem("secplus_soundEnabled", JSON.stringify(soundEnabled)); } catch {} }, [soundEnabled]);

      const audioCtxRef = useRef(null);
      const playSfx = useCallback((type) => {
        if (!soundEnabled) return;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          if (!audioCtxRef.current) audioCtxRef.current = new AC();
          const ctx = audioCtxRef.current;
          if (ctx.state === "suspended") ctx.resume().catch(() => {});
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const map = { flip:{f:520,d:0.06}, nav:{f:440,d:0.05}, gotIt:{f:740,d:0.08}, streak:{f:880,d:0.10} };
          const { f, d } = map[type] || map.nav;
          osc.type = "sine"; osc.frequency.setValueAtTime(f, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + d);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(now); osc.stop(now + d + 0.02);
        } catch {}
      }, [soundEnabled]);

      // ─── Persistence ───
      useEffect(() => {
        try {
          const r = localStorage.getItem("streak-data");
          if (r) {
            const data = JSON.parse(r);
            const today = getToday(), yesterday = getYesterday();
            if (data.lastStudyDate === today) { setDailyStreak(data.streak); setLastStudyDate(data.lastStudyDate); setTodayCompleted(true); setSectionsCompletedToday(new Set(data.sectionsToday || [])); }
            else if (data.lastStudyDate === yesterday) { setDailyStreak(data.streak); setLastStudyDate(data.lastStudyDate); }
          }
        } catch {}
        try {
          const m = localStorage.getItem("mastered-cards"); if (m) setMastered(JSON.parse(m));
          const p = localStorage.getItem("card-progress"); if (p) setProgress(JSON.parse(p));
        } catch {}
      }, []);

      const saveStreak = useCallback((streak, lastDate, sectionsToday) => {
        try { localStorage.setItem("streak-data", JSON.stringify({ streak, lastStudyDate: lastDate, sectionsToday: [...sectionsToday] })); } catch {}
      }, []);

      useEffect(() => { if (Object.keys(mastered).length > 0) try { localStorage.setItem("mastered-cards", JSON.stringify(mastered)); } catch {} }, [mastered]);
      useEffect(() => { if (Object.keys(progress).length > 0) try { localStorage.setItem("card-progress", JSON.stringify(progress)); } catch {} }, [progress]);

      // ─── Helpers ───
      const buildCardOrder = useCallback((sectionId, cards, doShuffle, doUnmastered, currentMastered) => {
        let indices = cards.map((_, i) => i);
        if (doUnmastered) { const r = indices.filter(i => !currentMastered[`${sectionId}-${i}`]); indices = r.length > 0 ? r : indices; }
        if (doShuffle) { for (let i = indices.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indices[i], indices[j]] = [indices[j], indices[i]]; } }
        return indices;
      }, []);

      const markStudied = useCallback((sectionId, cardIndex) => {
        setProgress(prev => {
          const section = prev[sectionId] || { studied: 0, mastered: 0, cards: {} };
          const cards = { ...section.cards, [cardIndex]: true };
          return { ...prev, [sectionId]: { ...section, studied: Object.keys(cards).length, cards } };
        });
      }, []);

      const markMastered = useCallback((sectionId, cardIndex) => {
        const key = `${sectionId}-${cardIndex}`;
        setMastered(prev => {
          const updated = { ...prev, [key]: true };
          const sectionCards = cardData?.[sectionId] || [];
          const allMastered = sectionCards.every((_, idx) => updated[`${sectionId}-${idx}`]);
          if (allMastered && !sectionsCompletedToday.has(sectionId)) {
            const today = getToday();
            const newSections = new Set(sectionsCompletedToday); newSections.add(sectionId);
            setSectionsCompletedToday(newSections);
            if (!todayCompleted) {
              const ns = (lastStudyDate === getYesterday() || lastStudyDate === today) ? dailyStreak + 1 : 1;
              setDailyStreak(ns); playSfx("streak"); setLastStudyDate(today); setTodayCompleted(true);
              setShowStreakPopup(true); setTimeout(() => setShowStreakPopup(false), 3000);
              saveStreak(ns, today, newSections);
            } else { saveStreak(dailyStreak, today, newSections); }
            setShowCelebration(true); setTimeout(() => setShowCelebration(false), 2500);
          }
          return updated;
        });
        markStudied(sectionId, cardIndex);
      }, [markStudied, cardData, sectionsCompletedToday, todayCompleted, lastStudyDate, dailyStreak, saveStreak, playSfx]);

      // ─── Build random pool ───
      const buildRandomPool = useCallback(() => {
        const pool = [];
        Object.keys(cardData).forEach(sectionId => {
          cardData[sectionId].forEach((card, idx) => {
            pool.push({ sectionId, cardIdx: idx, card });
          });
        });
        // Fisher-Yates shuffle
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool;
      }, [cardData]);

      const totalCards = useMemo(() => cardData ? Object.values(cardData).reduce((s, c) => s + c.length, 0) : 0, [cardData]);
      const totalMastered = Object.keys(mastered).length;

      const domains = useMemo(() => {
        const d = {};
        SECTIONS_META.forEach(s => { if (!d[s.domain]) d[s.domain] = []; d[s.domain].push(s); });
        return d;
      }, []);

      const filteredSections = searchQuery
        ? SECTIONS_META.filter(s => s.title.toLowerCase().includes(searchQuery.toLowerCase()) || s.domain.toLowerCase().includes(searchQuery.toLowerCase()))
        : selectedDomain ? SECTIONS_META.filter(s => s.domain === selectedDomain) : SECTIONS_META;

      // Keyboard
      useEffect(() => { studyStateRef.current = { flipped, currentCard, cardOrder, selectedSection, view, randomPool, randomIndex }; }, [flipped, currentCard, cardOrder, selectedSection, view, randomPool, randomIndex]);

      useEffect(() => {
        if (view !== "study" && view !== "random") return;
        const handler = (e) => {
          const s = studyStateRef.current;
          if (s.view === "study") {
            const origIdx = s.cardOrder[s.currentCard] ?? s.currentCard;
            if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); if (!s.flipped) markStudied(s.selectedSection.id, origIdx); playSfx("flip"); setFlipped(f => !f); }
            else if (e.code === "ArrowRight") { if (s.currentCard < s.cardOrder.length - 1) { playSfx("nav"); setCurrentCard(c => c + 1); setFlipped(false); } }
            else if (e.code === "ArrowLeft") { if (s.currentCard > 0) { playSfx("nav"); setCurrentCard(c => c - 1); setFlipped(false); } }
            else if ((e.code === "KeyG" || e.code === "Enter") && s.flipped) { e.preventDefault(); playSfx("gotIt"); markMastered(s.selectedSection.id, origIdx); setFlipped(false); if (s.currentCard < s.cardOrder.length - 1) setCurrentCard(c => c + 1); }
            else if (e.code === "KeyS" && s.flipped) { setFlipped(false); if (s.currentCard < s.cardOrder.length - 1) setCurrentCard(c => c + 1); }
          } else if (s.view === "random") {
            if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); playSfx("flip"); setFlipped(f => !f); }
            else if ((e.code === "ArrowRight" || e.code === "KeyS" || e.code === "KeyG" || e.code === "Enter")) {
              if (s.flipped) {
                if (e.code === "KeyG" || e.code === "Enter") {
                  playSfx("gotIt");
                }
                playSfx("nav"); setFlipped(false);
                setRandomIndex(i => (i + 1) % s.randomPool.length);
                setRandomCardsStudied(c => c + 1);
              }
            }
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [view, markStudied, markMastered, playSfx]);

      /* ────── Shared Styles ────── */
      const S = {
        bg: "#0B1215",
        card: "#141E23",
        cardHover: "#1A2830",
        border: "#1C2A31",
        textPrimary: "#E8F0F2",
        textSecondary: "#7A9AA8",
        textMuted: "#3D5560",
        font: "'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif",
      };

      /* ────── Overlay Components ────── */
      const CelebrationOverlay = () => showCelebration ? (
        <div style={{ position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.75)",zIndex:999,animation:"fadeIn 0.3s ease",backdropFilter:"blur(8px)" }}>
          <div style={{ textAlign:"center",animation:"bounceIn 0.5s ease",background:S.card,borderRadius:20,padding:"36px 44px",border:`1px solid ${S.border}`,boxShadow:"0 24px 80px rgba(0,0,0,0.6)" }}>
            <div style={{ fontSize:18,fontWeight:800,color:S.textPrimary,marginBottom:6,letterSpacing:0.5 }}>DECK COMPLETE</div>
            <div style={{ fontSize:13,color:S.textSecondary,fontWeight:600 }}>Every card in this section mastered</div>
            <div style={{ width:40,height:3,background:"#58CC02",borderRadius:2,margin:"14px auto 0" }} />
          </div>
        </div>
      ) : null;

      const StreakPopup = () => showStreakPopup ? (
        <div style={{ position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:1000,animation:"slideDown 0.4s ease" }}>
          <div style={{ background:S.card,border:"1px solid #FFC80044",borderRadius:14,padding:"14px 24px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 12px 40px rgba(0,0,0,0.5)" }}>
            <div style={{ width:44,height:44,borderRadius:12,background:"rgba(255,200,0,0.12)",display:"flex",alignItems:"center",justifyContent:"center" }}>
              <span style={{ fontSize:22,color:"#FFC800",fontWeight:900 }}>{dailyStreak}</span>
            </div>
            <div>
              <div style={{ fontSize:15,fontWeight:800,color:"#FFC800" }}>Day Streak!</div>
              <div style={{ fontSize:11,fontWeight:600,color:S.textSecondary }}>{dailyStreak === 1 ? "Come back tomorrow to keep it going" : "Keep it going!"}</div>
            </div>
          </div>
        </div>
      ) : null;

      /* ────── Back Button ────── */
      const BackButton = ({ onClick }) => (
        <button onClick={onClick} style={{ background:"none",border:"none",color:S.textSecondary,fontSize:14,cursor:"pointer",padding:"8px 0",fontWeight:700,fontFamily:S.font,display:"flex",alignItems:"center",gap:6 }}>
          <span style={{ fontSize:18 }}>&#8592;</span> Back
        </button>
      );

      /* ═══════════════════ RANDOM VIEW ═══════════════════ */
      if (view === "random") {
        const item = randomPool[randomIndex];
        if (!item) return null;
        const sectionMeta = SECTIONS_META.find(s => s.id === item.sectionId);

        return (
          <div style={{ minHeight:"100vh",background:S.bg,fontFamily:S.font,color:S.textPrimary,maxWidth:480,margin:"0 auto",position:"relative" }}>
            <CelebrationOverlay /><StreakPopup />

            {/* Header */}
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:`1px solid ${S.border}` }}>
              <BackButton onClick={() => { setView("home"); setFlipped(false); }} />
              <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                <span style={{ color:S.textMuted,fontSize:12,fontWeight:700 }}>RANDOM MODE</span>
                <div style={{ background:S.card,borderRadius:10,padding:"6px 12px",border:`1px solid ${S.border}` }}>
                  <span style={{ color:S.textSecondary,fontSize:13,fontWeight:800 }}>{randomCardsStudied} studied</span>
                </div>
              </div>
            </div>

            {/* Source tag */}
            <div style={{ padding:"12px 20px 0",display:"flex",alignItems:"center",gap:8 }}>
              <div style={{ height:3,width:16,borderRadius:2,background:sectionMeta?.color || "#888" }} />
              <span style={{ fontSize:11,fontWeight:700,color:sectionMeta?.color || "#888",letterSpacing:0.5 }}>
                {sectionMeta?.title?.toUpperCase()}
              </span>
            </div>

            {/* Card */}
            <div style={{ padding:"16px 20px 100px" }}>
              <div
                onClick={() => { playSfx("flip"); setFlipped(!flipped); }}
                style={{
                  background: flipped ? S.card : (sectionMeta?.color || "#58CC02"),
                  borderRadius: 16,
                  padding: 28,
                  minHeight: 360,
                  cursor: "pointer",
                  display: "flex",
                  flexDirection: "column",
                  justifyContent: flipped ? "flex-start" : "center",
                  alignItems: flipped ? "flex-start" : "center",
                  border: flipped ? `1px solid ${S.border}` : "none",
                  boxShadow: flipped ? "0 8px 32px rgba(0,0,0,0.4)" : `0 6px 0 ${sectionMeta?.color || "#58CC02"}66, 0 12px 40px rgba(0,0,0,0.3)`,
                  transition: "all 0.25s ease",
                  position: "relative",
                }}
              >
                {!flipped ? (
                  <>
                    <div style={{ fontSize:24,fontWeight:800,textAlign:"center",color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.2)",lineHeight:1.3 }}>{item.card.t}</div>
                    <div style={{ marginTop:20,fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5 }}>Tap to reveal</div>
                  </>
                ) : (
                  <>
                    <div style={{ fontSize:14,fontWeight:800,color:sectionMeta?.color || "#58CC02",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5 }}>{item.card.t}</div>
                    <div style={{ fontSize:14,lineHeight:1.75,color:"#C0D8E2",whiteSpace:"pre-line",fontWeight:500 }}>{item.card.c}</div>
                  </>
                )}
              </div>

              {/* Action buttons */}
              {flipped && (
                <div style={{ display:"flex",gap:12,marginTop:16,animation:"slideUp 0.25s ease" }}>
                  <button onClick={() => {
                    playSfx("nav"); setFlipped(false);
                    setRandomIndex(i => (i + 1) % randomPool.length);
                    setRandomCardsStudied(c => c + 1);
                  }} style={{
                    flex:1,padding:"14px 20px",borderRadius:12,border:`1px solid #FF4B4B`,background:"transparent",color:"#FF4B4B",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:S.font,
                  }}>NEXT</button>
                  <button onClick={() => {
                    playSfx("gotIt");
                    setFlipped(false);
                    setRandomIndex(i => (i + 1) % randomPool.length);
                    setRandomCardsStudied(c => c + 1);
                  }} style={{
                    flex:1,padding:"14px 20px",borderRadius:12,border:"none",background:"#58CC02",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:S.font,boxShadow:"0 3px 0 #46A302",
                  }}>GOT IT</button>
                </div>
              )}

              {/* Reshuffle */}
              <div style={{ textAlign:"center",marginTop:16 }}>
                <button onClick={() => { const p = buildRandomPool(); setRandomPool(p); setRandomIndex(0); setFlipped(false); playSfx("nav"); }} style={{
                  background:S.card,border:`1px solid ${S.border}`,borderRadius:10,padding:"8px 16px",color:S.textSecondary,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:S.font,
                }}>Reshuffle All Cards</button>
              </div>

              <div style={{ textAlign:"center",fontSize:11,color:S.textMuted,fontWeight:600,marginTop:12 }}>
                Space: flip &middot; G: got it &middot; S/Right: next
              </div>
            </div>

            <style>{`
              @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap');
              @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
              @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0 } 50% { transform: scale(1.05) } 100% { transform: scale(1); opacity: 1 } }
              @keyframes slideUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
              @keyframes slideDown { from { transform: translateX(-50%) translateY(-40px); opacity: 0 } to { transform: translateX(-50%) translateY(0); opacity: 1 } }
            `}</style>
          </div>
        );
      }

      /* ═══════════════════ STUDY VIEW ═══════════════════ */
      if (view === "study" && selectedSection && cardData) {
        const cards = cardData[selectedSection.id] || [];
        const displayOrder = cardOrder.length > 0 ? cardOrder : cards.map((_, i) => i);
        const originalIdx = displayOrder[currentCard] ?? currentCard;
        const card = cards[originalIdx];
        const sectionMeta = SECTIONS_META.find(s => s.id === selectedSection.id);
        const isMastered = mastered[`${selectedSection.id}-${originalIdx}`];
        const progressPct = displayOrder.length > 0 ? ((currentCard + 1) / displayOrder.length) * 100 : 0;

        return (
          <div style={{ minHeight:"100vh",background:S.bg,fontFamily:S.font,color:S.textPrimary,maxWidth:480,margin:"0 auto",position:"relative" }}>
            <CelebrationOverlay /><StreakPopup />

            {/* Header */}
            <div style={{ display:"flex",alignItems:"center",padding:"16px 20px",borderBottom:`1px solid ${S.border}` }}>
              <BackButton onClick={() => { setView("home"); setCurrentCard(0); setFlipped(false); }} />
              <div style={{ flex:1,margin:"0 16px" }}>
                <div style={{ height:4,background:S.card,borderRadius:4,overflow:"hidden" }}>
                  <div style={{ height:"100%",width:`${progressPct}%`,background:sectionMeta?.color || "#58CC02",borderRadius:4,transition:"width 0.4s ease" }} />
                </div>
              </div>
              <span style={{ color:S.textSecondary,fontSize:13,fontWeight:700 }}>{currentCard + 1}/{displayOrder.length}</span>
            </div>

            {/* Toggles */}
            <div style={{ display:"flex",gap:8,padding:"10px 20px",justifyContent:"flex-end" }}>
              <button onClick={() => {
                const next = !shuffled; setShuffled(next);
                const order = buildCardOrder(selectedSection.id, cards, next, unmasteredOnly, mastered);
                playSfx("nav"); setCardOrder(order); setCurrentCard(0); setFlipped(false);
              }} style={{
                padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:800,fontFamily:S.font,cursor:"pointer",
                border:`1px solid ${shuffled ? "#FFC800" : S.border}`,background:shuffled ? "rgba(255,200,0,0.1)" : S.card,color:shuffled ? "#FFC800" : S.textSecondary,
              }}>Shuffle</button>
              <button onClick={() => {
                const next = !unmasteredOnly; setUnmasteredOnly(next);
                const order = buildCardOrder(selectedSection.id, cards, shuffled, next, mastered);
                playSfx("nav"); setCardOrder(order); setCurrentCard(0); setFlipped(false);
              }} style={{
                padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:800,fontFamily:S.font,cursor:"pointer",
                border:`1px solid ${unmasteredOnly ? "#1CB0F6" : S.border}`,background:unmasteredOnly ? "rgba(28,176,246,0.1)" : S.card,color:unmasteredOnly ? "#1CB0F6" : S.textSecondary,
              }}>Unmastered</button>
            </div>

            {/* Card */}
            <div style={{ padding:"16px 20px 100px" }}>
              <div
                onClick={() => { playSfx("flip"); setFlipped(!flipped); if (!flipped) markStudied(selectedSection.id, originalIdx); }}
                style={{
                  background: flipped ? S.card : (sectionMeta?.color || "#58CC02"),
                  borderRadius: 16, padding: 28, minHeight: 360, cursor: "pointer",
                  display: "flex", flexDirection: "column",
                  justifyContent: flipped ? "flex-start" : "center",
                  alignItems: flipped ? "flex-start" : "center",
                  border: flipped ? `1px solid ${S.border}` : "none",
                  boxShadow: flipped ? "0 8px 32px rgba(0,0,0,0.4)" : `0 6px 0 ${sectionMeta?.color || "#58CC02"}66, 0 12px 40px rgba(0,0,0,0.3)`,
                  transition: "all 0.25s ease", position: "relative",
                }}
              >
                {!flipped ? (
                  <>
                    <div style={{ fontSize:24,fontWeight:800,textAlign:"center",color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.2)",lineHeight:1.3 }}>{card?.t}</div>
                    <div style={{ marginTop:20,fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5 }}>Tap to reveal</div>
                  </>
                ) : (
                  <>
                    <div style={{ fontSize:14,fontWeight:800,color:sectionMeta?.color || "#58CC02",marginBottom:12,textTransform:"uppercase",letterSpacing:0.5 }}>{card?.t}</div>
                    <div style={{ fontSize:14,lineHeight:1.75,color:"#C0D8E2",whiteSpace:"pre-line",fontWeight:500 }}>{card?.c}</div>
                    {isMastered && <div style={{ position:"absolute",top:16,right:16,background:"#58CC02",borderRadius:50,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:800 }}>&#10003;</div>}
                  </>
                )}
              </div>

              {flipped && (
                <div style={{ display:"flex",gap:12,marginTop:16,animation:"slideUp 0.25s ease" }}>
                  <button onClick={(e) => { e.stopPropagation(); playSfx("nav"); setFlipped(false); if (currentCard < displayOrder.length - 1) setCurrentCard(currentCard + 1); }}
                    style={{ flex:1,padding:"14px 20px",borderRadius:12,border:`1px solid #FF4B4B`,background:"transparent",color:"#FF4B4B",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:S.font }}>STUDY AGAIN</button>
                  <button onClick={(e) => { e.stopPropagation(); playSfx("gotIt"); markMastered(selectedSection.id, originalIdx); setFlipped(false); if (currentCard < displayOrder.length - 1) setCurrentCard(currentCard + 1); }}
                    style={{ flex:1,padding:"14px 20px",borderRadius:12,border:"none",background:"#58CC02",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:S.font,boxShadow:"0 3px 0 #46A302" }}>GOT IT</button>
                </div>
              )}

              {!flipped && (
                <div style={{ display:"flex",justifyContent:"space-between",marginTop:16 }}>
                  <button disabled={currentCard === 0} onClick={() => { playSfx("nav"); setCurrentCard(currentCard - 1); setFlipped(false); }}
                    style={{ padding:"12px 24px",borderRadius:12,border:`1px solid ${S.border}`,background:S.card,color:currentCard === 0 ? S.textMuted : S.textSecondary,fontSize:14,fontWeight:700,cursor:currentCard === 0 ? "default" : "pointer",fontFamily:S.font }}>Prev</button>
                  <button disabled={currentCard === displayOrder.length - 1} onClick={() => { playSfx("nav"); setCurrentCard(currentCard + 1); setFlipped(false); }}
                    style={{ padding:"12px 24px",borderRadius:12,border:`1px solid ${S.border}`,background:S.card,color:currentCard === displayOrder.length - 1 ? S.textMuted : S.textSecondary,fontSize:14,fontWeight:700,cursor:currentCard === displayOrder.length - 1 ? "default" : "pointer",fontFamily:S.font }}>Next</button>
                </div>
              )}

              <div style={{ textAlign:"center",fontSize:11,color:S.textMuted,fontWeight:600,marginTop:12 }}>
                Space: flip &middot; G: got it &middot; S: skip &middot; &#8592; &#8594;: navigate
              </div>
            </div>

            <style>{`
              @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap');
              @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
              @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0 } 50% { transform: scale(1.05) } 100% { transform: scale(1); opacity: 1 } }
              @keyframes slideUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
              @keyframes slideDown { from { transform: translateX(-50%) translateY(-40px); opacity: 0 } to { transform: translateX(-50%) translateY(0); opacity: 1 } }
            `}</style>
          </div>
        );
      }

      /* ═══════════════════ HOME VIEW ═══════════════════ */
      return (
        <div style={{ minHeight:"100vh",background:S.bg,fontFamily:S.font,color:S.textPrimary,maxWidth:480,margin:"0 auto" }}>

          {/* Top bar */}
          <div style={{ padding:"24px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
            <div>
              <div style={{ fontSize:22,fontWeight:900,letterSpacing:-0.3,color:S.textPrimary }}>Sec+ Cards</div>
              <div style={{ color:S.textMuted,fontSize:12,fontWeight:600,marginTop:2 }}>SY0-701 Study Deck</div>
            </div>
            <div style={{ display:"flex",alignItems:"center",gap:10 }}>
              <button onClick={() => setSoundEnabled(v => !v)} style={{
                background:S.card,border:`1px solid ${S.border}`,borderRadius:10,padding:"8px 10px",cursor:"pointer",color:soundEnabled ? "#58CC02" : S.textMuted,fontSize:16,display:"flex",alignItems:"center",
              }}>{soundEnabled ? "\u{1F50A}" : "\u{1F507}"}</button>
              <div style={{ background:dailyStreak > 0 ? "rgba(255,200,0,0.08)" : S.card,border:`1px solid ${dailyStreak > 0 ? "rgba(255,200,0,0.2)" : S.border}`,borderRadius:10,padding:"8px 14px",display:"flex",alignItems:"center",gap:8 }}>
                <span style={{ fontWeight:900,color:dailyStreak > 0 ? "#FFC800" : S.textMuted,fontSize:16 }}>{dailyStreak}</span>
                <span style={{ color:S.textMuted,fontSize:10,fontWeight:700 }}>{dailyStreak === 1 ? "day" : "days"}</span>
              </div>
            </div>
          </div>

          {/* Streak banner */}
          {!todayCompleted && (
            <div style={{ margin:"14px 20px 0",padding:"12px 16px",borderRadius:10,background:S.card,border:`1px solid ${S.border}`,display:"flex",alignItems:"center",gap:10 }}>
              <div style={{ width:6,height:32,borderRadius:3,background:dailyStreak > 0 ? "#FFC800" : S.textMuted,flexShrink:0 }} />
              <div style={{ fontSize:12,fontWeight:600,color:S.textSecondary }}>
                {dailyStreak > 0 ? `Complete a deck to keep your ${dailyStreak}-day streak alive` : "Complete all cards in any deck to start a streak"}
              </div>
            </div>
          )}
          {todayCompleted && dailyStreak > 0 && (
            <div style={{ margin:"14px 20px 0",padding:"12px 16px",borderRadius:10,background:"rgba(88,204,2,0.06)",border:"1px solid rgba(88,204,2,0.15)",display:"flex",alignItems:"center",gap:10 }}>
              <div style={{ width:6,height:32,borderRadius:3,background:"#58CC02",flexShrink:0 }} />
              <div style={{ fontSize:12,fontWeight:600,color:"#58CC02" }}>Today's streak secured. Come back tomorrow.</div>
            </div>
          )}

          {/* Progress */}
          <div style={{ padding:"16px 20px" }}>
            <div style={{ background:S.card,borderRadius:12,padding:16,border:`1px solid ${S.border}` }}>
              <div style={{ display:"flex",justifyContent:"space-between",marginBottom:8 }}>
                <span style={{ fontSize:12,fontWeight:700,color:S.textSecondary }}>Overall Progress</span>
                <span style={{ fontSize:12,fontWeight:800,color:"#58CC02" }}>{totalCards > 0 ? Math.round((totalMastered / totalCards) * 100) : 0}%</span>
              </div>
              <div style={{ height:6,background:"rgba(0,0,0,0.3)",borderRadius:3,overflow:"hidden" }}>
                <div style={{ height:"100%",width:`${totalCards > 0 ? (totalMastered / totalCards) * 100 : 0}%`,background:"#58CC02",borderRadius:3,transition:"width 0.5s ease" }} />
              </div>
              <div style={{ display:"flex",justifyContent:"space-between",marginTop:8,fontSize:11,color:S.textMuted,fontWeight:600 }}>
                <span>{totalMastered} of {totalCards} cards</span>
                <span>19 topics</span>
              </div>
            </div>
          </div>

          {/* ── RANDOM MODE BUTTON ── */}
          <div style={{ padding:"0 20px 12px" }}>
            <button onClick={() => {
              const pool = buildRandomPool();
              setRandomPool(pool); setRandomIndex(0); setRandomCardsStudied(0); setFlipped(false);
              playSfx("nav"); setView("random");
            }} style={{
              width:"100%",padding:"16px 20px",borderRadius:12,cursor:"pointer",fontFamily:S.font,
              background:"linear-gradient(135deg, #1A2830 0%, #141E23 100%)",
              border:"1px solid rgba(255,200,0,0.2)",
              display:"flex",alignItems:"center",justifyContent:"space-between",
            }}>
              <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                <div style={{ width:42,height:42,borderRadius:10,background:"rgba(255,200,0,0.1)",display:"flex",alignItems:"center",justifyContent:"center" }}>
                  <span style={{ fontSize:14,fontWeight:900,color:"#FFC800" }}>?</span>
                </div>
                <div style={{ textAlign:"left" }}>
                  <div style={{ fontSize:15,fontWeight:800,color:S.textPrimary }}>Random Mode</div>
                  <div style={{ fontSize:11,fontWeight:600,color:S.textSecondary }}>Shuffled cards from all {totalCards} cards across every topic</div>
                </div>
              </div>
              <span style={{ color:S.textMuted,fontSize:18 }}>&#8594;</span>
            </button>
          </div>

          {/* Search */}
          <div style={{ padding:"0 20px 10px" }}>
            <input type="text" placeholder="Search topics..." value={searchQuery}
              onChange={(e) => { setSearchQuery(e.target.value); setSelectedDomain(null); }}
              style={{ width:"100%",padding:"11px 16px",borderRadius:10,border:`1px solid ${S.border}`,background:S.card,color:S.textPrimary,fontSize:13,fontWeight:600,outline:"none",boxSizing:"border-box",fontFamily:S.font }} />
          </div>

          {/* Domain filters */}
          <div style={{ display:"flex",gap:6,padding:"0 20px 14px",overflowX:"auto",whiteSpace:"nowrap" }}>
            <button onClick={() => { setSelectedDomain(null); setSearchQuery(""); }} style={{
              padding:"6px 14px",borderRadius:8,cursor:"pointer",flexShrink:0,fontFamily:S.font,fontSize:11,fontWeight:800,
              border:`1px solid ${!selectedDomain ? "#58CC02" : S.border}`,background:!selectedDomain ? "rgba(88,204,2,0.1)" : S.card,color:!selectedDomain ? "#58CC02" : S.textSecondary,
            }}>All</button>
            {Object.keys(domains).map(domain => (
              <button key={domain} onClick={() => { setSelectedDomain(domain === selectedDomain ? null : domain); setSearchQuery(""); }} style={{
                padding:"6px 14px",borderRadius:8,cursor:"pointer",flexShrink:0,fontFamily:S.font,fontSize:11,fontWeight:800,
                border:`1px solid ${selectedDomain === domain ? DOMAIN_COLORS[domain] : S.border}`,
                background:selectedDomain === domain ? `${DOMAIN_COLORS[domain]}15` : S.card,
                color:selectedDomain === domain ? DOMAIN_COLORS[domain] : S.textSecondary,
              }}>{DOMAIN_SHORT[domain] || domain}</button>
            ))}
          </div>

          {/* Section cards — NO EMOJIS */}
          <div style={{ padding:"0 20px 40px" }}>
            {filteredSections.map((section, i) => {
              const sectionCards = cardData?.[section.id] || [];
              const masteredCount = sectionCards.filter((_, idx) => mastered[`${section.id}-${idx}`]).length;
              const pct = sectionCards.length > 0 ? Math.round((masteredCount / sectionCards.length) * 100) : 0;
              const isComplete = pct === 100;

              return (
                <div key={section.id} onClick={() => {
                  const sc = cardData?.[section.id] || [];
                  const order = buildCardOrder(section.id, sc, shuffled, unmasteredOnly, mastered);
                  playSfx("nav"); setCardOrder(order); setSelectedSection(section); setCurrentCard(0); setFlipped(false); setView("study");
                }} style={{
                  background:S.card,borderRadius:12,padding:"16px 18px",marginBottom:10,cursor:"pointer",
                  borderLeft:`3px solid ${section.color}`,transition:"background 0.15s ease",
                  border:`1px solid ${S.border}`,borderLeftWidth:3,borderLeftColor:section.color,
                  animation: `slideUp 0.3s ease ${i * 0.025}s both`,
                }}
                onMouseEnter={e => e.currentTarget.style.background = S.cardHover}
                onMouseLeave={e => e.currentTarget.style.background = S.card}
                >
                  <div style={{ display:"flex",alignItems:"center",gap:14 }}>
                    {/* Color dot instead of emoji */}
                    <div style={{
                      width:42,height:42,borderRadius:10,flexShrink:0,
                      background:`${section.color}12`,border:`1px solid ${section.color}30`,
                      display:"flex",alignItems:"center",justifyContent:"center",
                    }}>
                      {isComplete
                        ? <span style={{ color:"#58CC02",fontSize:16,fontWeight:900 }}>&#10003;</span>
                        : <div style={{ width:10,height:10,borderRadius:3,background:section.color,opacity:0.7 }} />
                      }
                    </div>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontSize:14,fontWeight:800,marginBottom:2,color:S.textPrimary }}>{section.title}</div>
                      <div style={{ fontSize:10,color:S.textMuted,fontWeight:700,marginBottom:6 }}>
                        {section.domain} &middot; {sectionCards.length} cards
                      </div>
                      <div style={{ height:4,background:"rgba(0,0,0,0.3)",borderRadius:2,overflow:"hidden" }}>
                        <div style={{ height:"100%",width:`${pct}%`,background:section.color,borderRadius:2,transition:"width 0.5s ease" }} />
                      </div>
                    </div>
                    <div style={{ fontSize:12,fontWeight:800,color:pct > 0 ? section.color : S.textMuted,flexShrink:0 }}>{pct}%</div>
                  </div>
                </div>
              );
            })}
          </div>

          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap');
            @keyframes slideUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
            * { -webkit-tap-highlight-color: transparent; }
            ::-webkit-scrollbar { display: none; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(SecurityPlusApp));
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then(
          (reg) => console.log("SW registered:", reg.scope),
          (err) => console.log("SW registration failed:", err)
        );
      });
    }
  </script>
</body>
</html>
