    /* ═══════════ PROGRESS RING ═══════════ */
    function ProgressRing(props) {
      var pct = props.pct, color = props.color, size = props.size || 50, stroke = props.stroke || 4, label = props.label, theme = props.theme;
      var r = (size - stroke) / 2;
      var circ = 2 * Math.PI * r;
      var off = circ - (pct / 100) * circ;
      return React.createElement("div", {style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
        React.createElement("div", {style:{position:"relative",width:size,height:size}},
          React.createElement("svg", {width:size,height:size,style:{transform:"rotate(-90deg)",display:"block"}},
            React.createElement("circle", {cx:size/2,cy:size/2,r:r,fill:"none",stroke:theme.border,strokeWidth:stroke}),
            React.createElement("circle", {cx:size/2,cy:size/2,r:r,fill:"none",stroke:color,strokeWidth:stroke,strokeDasharray:circ,strokeDashoffset:off,strokeLinecap:"round",style:{transition:"stroke-dashoffset 0.6s ease"}})
          ),
          React.createElement("div", {style:{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",alignItems:"center",justifyContent:"center"}},
            React.createElement("span", {style:{fontSize:10,fontWeight:900,color:color}}, pct + "%")
          )
        ),
        label ? React.createElement("div", {style:{fontSize:9,fontWeight:700,color:theme.textMuted,textAlign:"center",lineHeight:"1.1"}}, label) : null
      );
    }

      // Random
      var _rp = useState([]), randomPool = _rp[0], setRandomPool = _rp[1];

      // Review
      var _mp = useState([]), mistakePool = _mp[0], setMistakePool = _mp[1];

      // Quiz
      var _qp = useState([]), quizPool = _qp[0], setQuizPool = _qp[1];
      var _qi = useState(0), quizIndex = _qi[0], setQuizIndex = _qi[1];
      var _qc = useState({}), quizChoices = _qc[0], setQuizChoices = _qc[1];
      var _qs = useState(null), quizSelected = _qs[0], setQuizSelected = _qs[1];
      var _qsc = useState(0), quizScore = _qsc[0], setQuizScore = _qsc[1];
      var _qt = useState(0), quizTotal = _qt[0], setQuizTotal = _qt[1];

      // Collapsed domains
      var _cdm = useState({}), collapsedDomains = _cdm[0], setCollapsedDomains = _cdm[1];

      // Sound
      var _se = useState(function() { try { return JSON.parse(localStorage.getItem("secplus_soundEnabled") || "true"); } catch(e) { return true; } });
      var soundEnabled = _se[0], setSoundEnabled = _se[1];
      useEffect(function() { try { localStorage.setItem("secplus_soundEnabled", JSON.stringify(soundEnabled)); } catch(e) {} }, [soundEnabled]);
      var audioCtxRef = useRef(null);
      var playSfx = useCallback(function(type) {
        if (!soundEnabled) return;
        try {
          var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
          if (!audioCtxRef.current) audioCtxRef.current = new AC();
          var ctx = audioCtxRef.current;
          if (ctx.state === "suspended") ctx.resume();
          var now = ctx.currentTime, osc = ctx.createOscillator(), gain = ctx.createGain();
          var map = { flip:{f:520,d:0.06}, nav:{f:440,d:0.05}, gotIt:{f:740,d:0.08}, streak:{f:880,d:0.10}, wrong:{f:300,d:0.12}, right:{f:660,d:0.10} };
          var cfg = map[type] || map.nav;
          osc.type = "sine"; osc.frequency.setValueAtTime(cfg.f, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + cfg.d);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(now); osc.stop(now + cfg.d + 0.02);
        } catch(e) {}
      }, [soundEnabled]);

      useEffect(function() {
        try {
          var r = localStorage.getItem("streak-data");

      useEffect(function() { if (Object.keys(mastered).length > 0) try { localStorage.setItem("mastered-cards", JSON.stringify(mastered)); } catch(e) {} }, [mastered]);
      useEffect(function() { if (Object.keys(progress).length > 0) try { localStorage.setItem("card-progress", JSON.stringify(progress)); } catch(e) {} }, [progress]);

      // Helpers
      function buildCardOrder(sid, cards, doShuf, doUnm, mst) {
        var idx = cards.map(function(_,i) { return i; });

      }

      function markMastered(sid, ci) {
        var key = sid + "-" + ci;
        setMastered(function(prev) {
          var up = Object.assign({}, prev); up[key] = true;
          var sc = cardData[sid] || [];
          var allDone = sc.every(function(_, i) { return up[sid + "-" + i]; });
          if (allDone && !sectionsCompletedToday.has(sid)) {
            var today = getToday(); var ns = new Set(sectionsCompletedToday); ns.add(sid); setSectionsCompletedToday(ns);
            if (!todayCompleted) {
              var nk = (lastStudyDate === getYesterday() || lastStudyDate === today) ? dailyStreak + 1 : 1;

          Object.keys(up).forEach(function(k) { if (k.indexOf(sid + "-") === 0) delete up[k]; });

      var allCards = useMemo(function() {

      var totalCards = allCards.length;

      if (view === "quiz") {
        var qItem = quizPool[quizIndex];
        if (!qItem) return React.createElement("div", {style:{minHeight:"100vh",background:T.bg,fontFamily:FONT,color:T.textPrimary,display:"flex",alignItems:"center",justifyContent:"center"}},

                    <button key={i} onClick={function() {
                      if (isAnswered) return;
                      setQuizSelected(choice);
                      setQuizTotal(function(t) { return t + 1; });
                      if (choice === quizChoices.correct) { setQuizScore(function(s) { return s + 1; }); playSfx("right"); }
                      else playSfx("wrong");
                    }} style={{padding:"14px 16px",borderRadius:12,border:"1px solid " + border,background:bg,color:tc,fontSize:13,fontWeight:600,cursor:isAnswered?"default":"pointer",textAlign:"left",fontFamily:FONT,lineHeight:1.4}}>
                      <span style={{fontWeight:800,marginRight:8,color:T.textMuted}}>{String.fromCharCode(65 + i)}.</span>

              {isAnswered && (

      /* ═══════════ RENDER: REVIEW ═══════════ */
      if (view === "review") {

              </div>
              {flipped && (
                <div style={{display:"flex",gap:12,marginTop:16,animation:"slideUp 0.25s ease"}}>
                  <button onClick={function() { playSfx("nav"); setFlipped(false); if (mistakeIndex < mistakePool.length - 1) setMistakeIndex(mistakeIndex + 1); }}
                    style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid #FF4B4B",background:"transparent",color:"#FF4B4B",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:FONT}}>NEXT</button>
                  <button onClick={function() { playSfx("gotIt"); markMastered(rItem.sectionId, rItem.cardIdx); setFlipped(false); if (mistakeIndex < mistakePool.length - 1) setMistakeIndex(mistakeIndex + 1); }}
                    style={{flex:1,padding:"14px",borderRadius:12,border:"none",background:"#58CC02",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:FONT,boxShadow:"0 3px 0 #46A302"}}>MASTERED</button>
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ═══════════ RENDER: RANDOM ═══════════ */
      if (view === "random") {
        var randItem = randomPool[randomIndex];
        if (!randItem) return null;
        var randMeta = SECTIONS_META.find(function(s) { return s.id === randItem.sectionId; });
        var randColor = randMeta ? randMeta.color : "#888";

        return (
          <div style={{minHeight:"100vh",background:T.bg,fontFamily:FONT,color:T.textPrimary,maxWidth:480,margin:"0 auto"}}>
            {showCelebration && <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:T.overlay,zIndex:999,animation:"fadeIn 0.3s ease",backdropFilter:"blur(8px)"}}>
              <div style={{textAlign:"center",animation:"bounceIn 0.5s ease",background:T.card,borderRadius:20,padding:"36px 44px",border:"1px solid "+T.border}}>
                <div style={{fontSize:18,fontWeight:800,color:T.textPrimary,marginBottom:6}}>DECK COMPLETE</div>

              </div>

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid " + T.border}}>

              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{color:T.textMuted,fontSize:11,fontWeight:700}}>RANDOM</span>
                <span style={{color:T.textSecondary,fontSize:13,fontWeight:700}}>{randomIndex + 1} of {randomPool.length}</span>

            <div style={{padding:"12px 20px 0",display:"flex",alignItems:"center",gap:8}}>

            <div style={{padding:"16px 20px 100px"}}>
              <div onClick={function() { playSfx("flip"); setFlipped(!flipped); }}
                style={{background:flipped ? T.card : randColor,borderRadius:16,padding:28,minHeight:340,cursor:"pointer",display:"flex",flexDirection:"column",justifyContent:flipped?"flex-start":"center",alignItems:flipped?"flex-start":"center",border:flipped?"1px solid "+T.border:"none",boxShadow:flipped?"0 8px 32px rgba(0,0,0,0.3)":"0 6px 0 "+randColor+"66",transition:"all 0.25s ease"}}>

                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <div style={{fontSize:13,fontWeight:800,color:randColor,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>{randItem.card.t}</div>
                    <div style={{fontSize:13,lineHeight:1.75,color:T.textPrimary,whiteSpace:"pre-line",fontWeight:500,opacity:0.9}}>{randItem.card.c}</div>
                  </React.Fragment>
                )}
              </div>
              {flipped && (
                <div style={{display:"flex",gap:12,marginTop:16,animation:"slideUp 0.25s ease"}}>
                  <button onClick={function() { playSfx("nav"); setFlipped(false); setRandomIndex(function(i) { return (i + 1) % randomPool.length; }); }}
                    style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid #FF4B4B",background:"transparent",color:"#FF4B4B",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:FONT}}>NEXT</button>
                  <button onClick={function() { playSfx("gotIt"); setFlipped(false); setRandomIndex(function(i) { return (i + 1) % randomPool.length; }); }}
                    style={{flex:1,padding:"14px",borderRadius:12,border:"none",background:"#58CC02",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:FONT,boxShadow:"0 3px 0 #46A302"}}>GOT IT</button>
                </div>
              )}
              <div style={{textAlign:"center",marginTop:14}}>
                <button onClick={function() { setRandomPool(shuffleArray(allCards.slice())); setRandomIndex(0); setFlipped(false); playSfx("nav"); }}
                  style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"8px 16px",color:T.textSecondary,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:FONT}}>Reshuffle</button>
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════ RENDER: STUDY ═══════════ */
      if (view === "study" && selectedSection) {
        var cards = cardData[selectedSection.id] || [];
        var displayOrder = cardOrder.length > 0 ? cardOrder : cards.map(function(_,i) { return i; });
        var oi = displayOrder[currentCard] != null ? displayOrder[currentCard] : currentCard;
        var card = cards[oi];
        var sColor = selectedSection.color;
        var im = mastered[selectedSection.id + "-" + oi];
        var pPct = displayOrder.length > 0 ? ((currentCard + 1) / displayOrder.length) * 100 : 0;

        return (
          <div style={{minHeight:"100vh",background:T.bg,fontFamily:FONT,color:T.textPrimary,maxWidth:480,margin:"0 auto"}}>
            {showCelebration && <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:T.overlay,zIndex:999,animation:"fadeIn 0.3s ease",backdropFilter:"blur(8px)"}}>
              <div style={{textAlign:"center",animation:"bounceIn 0.5s ease",background:T.card,borderRadius:20,padding:"36px 44px",border:"1px solid "+T.border}}>
                <div style={{fontSize:18,fontWeight:800,color:T.textPrimary,marginBottom:6}}>DECK COMPLETE</div>
                <div style={{fontSize:13,color:T.textSecondary,fontWeight:600}}>Every card mastered</div>
              </div>
            </div>}
            {showStreakPopup && <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:1000,animation:"slideDown 0.4s ease"}}>
              <div style={{background:T.card,border:"1px solid #FFC80044",borderRadius:14,padding:"14px 24px",display:"flex",alignItems:"center",gap:14}}>
                <span style={{fontSize:22,color:"#FFC800",fontWeight:900}}>{dailyStreak}</span>
                <div><div style={{fontSize:15,fontWeight:800,color:"#FFC800"}}>Day Streak!</div></div>
              </div>
            </div>}
            {showResetConfirm && <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:T.overlay,zIndex:999,backdropFilter:"blur(8px)"}}>
              <div style={{background:T.card,borderRadius:16,padding:"28px 32px",border:"1px solid "+T.border,textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:800,color:T.textPrimary,marginBottom:8}}>Reset {selectedSection.title}?</div>
                <div style={{fontSize:12,color:T.textSecondary,marginBottom:20}}>All mastery for this section will be cleared.</div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={function() { setShowResetConfirm(false); }} style={{flex:1,padding:10,borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.textSecondary,fontWeight:700,cursor:"pointer",fontFamily:FONT}}>Cancel</button>
                  <button onClick={function() { resetSection(selectedSection.id); }} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#FF4B4B",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:FONT}}>Reset</button>
                </div>
              </div>
            </div>}

            <div style={{display:"flex",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid "+T.border}}>
              <button onClick={goHome} style={{background:"none",border:"none",color:T.textSecondary,fontSize:14,cursor:"pointer",fontWeight:700,fontFamily:FONT}}>&#8592; Back</button>
              <div style={{flex:1,margin:"0 12px"}}><div style={{height:4,background:T.card,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:pPct+"%",background:sColor,borderRadius:4,transition:"width 0.4s ease"}} /></div></div>

            </div>

            <div style={{display:"flex",gap:8,padding:"10px 20px",justifyContent:"space-between"}}>
              <button onClick={function() { setShowResetConfirm(true); }} style={{padding:"5px 10px",borderRadius:8,fontSize:10,fontWeight:700,fontFamily:FONT,cursor:"pointer",border:"1px solid "+T.border,background:T.card,color:"#FF4B4B"}}>Reset</button>

                <button onClick={function() { var n = !shuffledMode; setShuffledMode(n); setCardOrder(buildCardOrder(selectedSection.id, cards, n, unmasteredOnly, mastered)); playSfx("nav"); setCurrentCard(0); setFlipped(false); }}
                  style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:800,fontFamily:FONT,cursor:"pointer",border:"1px solid "+(shuffledMode?"#FFC800":T.border),background:shuffledMode?"rgba(255,200,0,0.1)":T.card,color:shuffledMode?"#FFC800":T.textSecondary}}>Shuffle</button>
                <button onClick={function() { var n = !unmasteredOnly; setUnmasteredOnly(n); setCardOrder(buildCardOrder(selectedSection.id, cards, shuffledMode, n, mastered)); playSfx("nav"); setCurrentCard(0); setFlipped(false); }}
                  style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:800,fontFamily:FONT,cursor:"pointer",border:"1px solid "+(unmasteredOnly?"#1CB0F6":T.border),background:unmasteredOnly?"rgba(28,176,246,0.1)":T.card,color:unmasteredOnly?"#1CB0F6":T.textSecondary}}>Unmastered</button>
              </div>
            </div>

            <div style={{padding:"12px 20px 100px"}}>
              <div onClick={function() { playSfx("flip"); setFlipped(!flipped); if (!flipped) markStudied(selectedSection.id, oi); }}
                style={{background:flipped ? T.card : sColor,borderRadius:16,padding:28,minHeight:340,cursor:"pointer",display:"flex",flexDirection:"column",justifyContent:flipped?"flex-start":"center",alignItems:flipped?"flex-start":"center",border:flipped?"1px solid "+T.border:"none",boxShadow:flipped?"0 8px 32px rgba(0,0,0,0.3)":"0 6px 0 "+sColor+"66",transition:"all 0.25s ease",position:"relative"}}>
                {!flipped ? (
                  <React.Fragment>
                    <div style={{fontSize:22,fontWeight:800,textAlign:"center",color:"#fff",textShadow:"0 2px 4px rgba(0,0,0,0.2)",lineHeight:1.3}}>{card ? card.t : ""}</div>
                    <div style={{marginTop:18,fontSize:11,color:"rgba(255,255,255,0.6)",fontWeight:700,textTransform:"uppercase",letterSpacing:1.5}}>Tap to reveal</div>
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <div style={{fontSize:13,fontWeight:800,color:sColor,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>{card ? card.t : ""}</div>
                    <div style={{fontSize:13,lineHeight:1.75,color:T.textPrimary,whiteSpace:"pre-line",fontWeight:500,opacity:0.9}}>{card ? card.c : ""}</div>
                    {im && <div style={{position:"absolute",top:14,right:14,background:"#58CC02",borderRadius:50,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:800}}>&#10003;</div>}
                  </React.Fragment>
                )}
              </div>
              {flipped ? (
                <div style={{display:"flex",gap:12,marginTop:16,animation:"slideUp 0.25s ease"}}>
                  <button onClick={function() { playSfx("nav"); setFlipped(false); if (currentCard < displayOrder.length - 1) setCurrentCard(currentCard + 1); }}
                    style={{flex:1,padding:"14px",borderRadius:12,border:"1px solid #FF4B4B",background:"transparent",color:"#FF4B4B",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:FONT}}>STUDY AGAIN</button>
                  <button onClick={function() { playSfx("gotIt"); markMastered(selectedSection.id, oi); setFlipped(false); if (currentCard < displayOrder.length - 1) setCurrentCard(currentCard + 1); }}
                    style={{flex:1,padding:"14px",borderRadius:12,border:"none",background:"#58CC02",color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:FONT,boxShadow:"0 3px 0 #46A302"}}>GOT IT</button>
                </div>
              ) : (
                <div style={{display:"flex",justifyContent:"space-between",marginTop:16}}>
                  <button disabled={currentCard === 0} onClick={function() { playSfx("nav"); setCurrentCard(currentCard - 1); setFlipped(false); }}
                    style={{padding:"12px 24px",borderRadius:12,border:"1px solid "+T.border,background:T.card,color:currentCard === 0 ? T.textMuted : T.textSecondary,fontSize:14,fontWeight:700,cursor:currentCard === 0?"default":"pointer",fontFamily:FONT}}>Prev</button>
                  <button disabled={currentCard === displayOrder.length - 1} onClick={function() { playSfx("nav"); setCurrentCard(currentCard + 1); setFlipped(false); }}
                    style={{padding:"12px 24px",borderRadius:12,border:"1px solid "+T.border,background:T.card,color:currentCard === displayOrder.length - 1 ? T.textMuted : T.textSecondary,fontSize:14,fontWeight:700,cursor:currentCard === displayOrder.length - 1?"default":"pointer",fontFamily:FONT}}>Next</button>
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ═══════════ RENDER: HOME ═══════════ */
      return (
        <div style={{minHeight:"100vh",background:T.bg,fontFamily:FONT,color:T.textPrimary,maxWidth:480,margin:"0 auto"}}>
          {/* Top bar */}
          <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.3}}>Sec+ Cards</div>
              <div style={{color:T.textMuted,fontSize:11,fontWeight:600,marginTop:2}}>SY0-701 Study Deck</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={function() { setSoundEnabled(!soundEnabled); }} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"6px 8px",cursor:"pointer",color:soundEnabled?"#58CC02":T.textMuted,fontSize:14,display:"flex",alignItems:"center"}}>{soundEnabled ? "\u{1F50A}" : "\u{1F507}"}</button>
              <button onClick={function() { setThemeName(themeName === "dark" ? "light" : "dark"); }} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"6px 8px",cursor:"pointer",color:T.textSecondary,fontSize:14,display:"flex",alignItems:"center"}}>{themeName === "dark" ? "\u2600" : "\u263D"}</button>
              <div style={{background:dailyStreak > 0 ? "rgba(255,200,0,0.08)" : T.card,border:"1px solid "+(dailyStreak > 0 ? "rgba(255,200,0,0.2)" : T.border),borderRadius:8,padding:"6px 12px",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:900,color:dailyStreak > 0 ? "#FFC800" : T.textMuted,fontSize:14}}>{dailyStreak}</span>
                <span style={{color:T.textMuted,fontSize:9,fontWeight:700}}>{dailyStreak === 1 ? "day" : "days"}</span>
              </div>
            </div>
          </div>

          {/* Progress Rings */}
          <div style={{padding:"16px 20px"}}>
            <div style={{background:T.card,borderRadius:14,padding:"16px 12px",border:"1px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              {DOMAINS.map(function(d) {
                var s = domainStats[d.label];
                var pct = s.total > 0 ? Math.round((s.mastered / s.total) * 100) : 0;
                return React.createElement(ProgressRing, {key:d.key, pct:pct, color:d.color, size:48, stroke:4, label:d.short.split(":")[0], theme:T});
              })}
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <div style={{fontSize:20,fontWeight:900,color:T.textPrimary}}>{totalCards > 0 ? Math.round((totalMastered / totalCards) * 100) : 0}%</div>
                <div style={{fontSize:9,fontWeight:700,color:T.textMuted}}>TOTAL</div>
              </div>
            </div>
          </div>

          {/* Mode buttons */}
          <div style={{padding:"0 20px",display:"flex",gap:8,marginBottom:12}}>
            <button onClick={function() { setRandomPool(shuffleArray(allCards.slice())); setRandomIndex(0); setFlipped(false); playSfx("nav"); setView("random"); }}
              style={{flex:1,padding:"14px 10px",borderRadius:12,cursor:"pointer",fontFamily:FONT,background:T.card,border:"1px solid rgba(255,200,0,0.2)",display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,200,0,0.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:12,fontWeight:900,color:"#FFC800"}}>?</span></div>
              <div style={{textAlign:"left"}}><div style={{fontSize:12,fontWeight:800,color:T.textPrimary}}>Random</div><div style={{fontSize:9,fontWeight:600,color:T.textSecondary}}>{totalCards} cards</div></div>
            </button>
            <button onClick={function() { setMistakePool(buildMistakePool()); setMistakeIndex(0); setFlipped(false); playSfx("nav"); setView("review"); }}
              style={{flex:1,padding:"14px 10px",borderRadius:12,cursor:"pointer",fontFamily:FONT,background:T.card,border:"1px solid rgba(255,75,75,0.2)",display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,75,75,0.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:12,fontWeight:900,color:"#FF4B4B"}}>!</span></div>
              <div style={{textAlign:"left"}}><div style={{fontSize:12,fontWeight:800,color:T.textPrimary}}>Review</div><div style={{fontSize:9,fontWeight:600,color:T.textSecondary}}>{mistakeCount} cards</div></div>
            </button>
            <button onClick={function() { var p = shuffleArray(allCards.slice()); setQuizPool(p); setQuizIndex(0); setQuizScore(0); setQuizTotal(0); setQuizSelected(null); setQuizChoices(generateQuizChoices(p[0])); playSfx("nav"); setView("quiz"); }}
              style={{flex:1,padding:"14px 10px",borderRadius:12,cursor:"pointer",fontFamily:FONT,background:T.card,border:"1px solid rgba(28,176,246,0.2)",display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:32,height:32,borderRadius:8,background:"rgba(28,176,246,0.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontSize:12,fontWeight:900,color:"#1CB0F6"}}>Q</span></div>
              <div style={{textAlign:"left"}}><div style={{fontSize:12,fontWeight:800,color:T.textPrimary}}>Quiz</div><div style={{fontSize:9,fontWeight:600,color:T.textSecondary}}>4-choice</div></div>
            </button>
          </div>

          {/* Search */}
          <div style={{padding:"0 20px 10px"}}>
            <input type="text" placeholder="Search topics..." value={searchQuery} onChange={function(e) { setSearchQuery(e.target.value); }}
              style={{width:"100%",padding:"10px 14px",borderRadius:10,border:"1px solid "+T.border,background:T.card,color:T.textPrimary,fontSize:12,fontWeight:600,outline:"none",fontFamily:FONT}} />
          </div>

          {/* Domain-grouped sections */}
          <div style={{padding:"0 20px 40px"}}>
            {DOMAINS.map(function(domain) {
              var sections = SECTIONS_META.filter(function(s) { return s.domain === domain.label; });
              var filtered = searchQuery ? sections.filter(function(s) { return s.title.toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0; }) : sections;
              if (filtered.length === 0) return null;
              var collapsed = collapsedDomains[domain.key];
              var ds = domainStats[domain.label];
              var dPct = ds.total > 0 ? Math.round((ds.mastered / ds.total) * 100) : 0;

              return (
                <div key={domain.key} style={{marginBottom:8}}>
                  <button onClick={function() { setCollapsedDomains(function(p) { var up = Object.assign({}, p); up[domain.key] = !up[domain.key]; return up; }); }}
                    style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",border:"none",background:"transparent",cursor:"pointer",fontFamily:FONT}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:4,height:20,borderRadius:2,background:domain.color}} />
                      <span style={{fontSize:12,fontWeight:800,color:domain.color}}>{domain.short}</span>
                      <span style={{fontSize:10,fontWeight:600,color:T.textMuted}}>{ds.mastered}/{ds.total}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,fontWeight:800,color:dPct > 0 ? domain.color : T.textMuted}}>{dPct}%</span>
                      <span style={{fontSize:12,color:T.textMuted,transform:collapsed?"rotate(-90deg)":"rotate(0deg)",transition:"transform 0.2s ease",display:"inline-block"}}>&#9660;</span>
                    </div>
                  </button>

                  {!collapsed && filtered.map(function(section, i) {
                    var sc = cardData[section.id] || [];
                    var mc = sc.filter(function(_, idx) { return mastered[section.id + "-" + idx]; }).length;
                    var pct = sc.length > 0 ? Math.round((mc / sc.length) * 100) : 0;
                    var isComplete = pct === 100;

                    return (
                      <div key={section.id} onClick={function() {
                        var order = buildCardOrder(section.id, sc, shuffledMode, unmasteredOnly, mastered);
                        playSfx("nav"); setCardOrder(order); setSelectedSection(section); setCurrentCard(0); setFlipped(false); setView("study");
                      }} style={{
                        background:T.card,borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",
                        border:"1px solid "+T.border,borderLeft:"3px solid "+domain.color,
                        transition:"background 0.15s ease",animation:"slideUp 0.2s ease " + (i * 0.02) + "s both",
                      }}
                      onMouseEnter={function(e) { e.currentTarget.style.background = T.cardHover; }}
                      onMouseLeave={function(e) { e.currentTarget.style.background = T.card; }}>
                        <div style={{display:"flex",alignItems:"center",gap:12}}>
                          <div style={{width:36,height:36,borderRadius:8,flexShrink:0,background:domain.color+"12",border:"1px solid "+domain.color+"30",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {isComplete ? <span style={{color:"#58CC02",fontSize:14,fontWeight:900}}>&#10003;</span>
                              : <div style={{width:8,height:8,borderRadius:2,background:domain.color,opacity:0.7}} />}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                              <div style={{fontSize:13,fontWeight:800,color:T.textPrimary}}>{section.title}</div>
                              <span style={{fontSize:11,fontWeight:800,color:mc > 0 ? domain.color : T.textMuted,flexShrink:0,marginLeft:8}}>{mc}/{sc.length}</span>
                            </div>
                            <div style={{height:3,background:T.textMuted+"33",borderRadius:2,overflow:"hidden"}}>
                              <div style={{height:"100%",width:pct+"%",background:domain.color,borderRadius:2,transition:"width 0.5s ease"}} />
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("./sw.js").then(
          function(r) { console.log("SW:", r.scope); },
          function(e) { console.log("SW fail:", e); }
        );
      });
    }
  </script>
</body>
</html>
